name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

jobs:
  inspect-release:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.release.outputs.should_release }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Inspect release state
        id: release
        shell: bash
        run: |
          metadata="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as f:
              project = tomllib.load(f)["project"]

          print(project["name"])
          print(project["version"])
          PY
          )"

          name="$(printf '%s\n' "$metadata" | sed -n '1p')"
          version="$(printf '%s\n' "$metadata" | sed -n '2p')"

          should_release="$(python - "$name" "$version" <<'PY'
          import sys
          import urllib.error
          import urllib.request

          name, version = sys.argv[1], sys.argv[2]
          url = f"https://pypi.org/pypi/{name}/{version}/json"

          try:
              urllib.request.urlopen(url, timeout=10).close()
          except urllib.error.HTTPError as exc:
              if exc.code == 404:
                  print("true")
                  sys.exit(0)
              raise
          else:
              print("false")
          PY
          )"

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

  publish:
    needs: inspect-release
    if: needs.inspect-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build distribution packages
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.inspect-release.outputs.version }}
          name: v${{ needs.inspect-release.outputs.version }}
          generate_release_notes: true
          files: dist/*
